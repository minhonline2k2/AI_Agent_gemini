services:
  postgres:
    image: postgres:16-alpine
    container_name: aiops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-aiops}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aiops_password}"
      POSTGRES_DB: "${POSTGRES_DB:-ai_incident_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiops-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiops-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://aiops:aiops_password@postgres:5432/ai_incident_db}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiops-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8000"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: aiops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data: